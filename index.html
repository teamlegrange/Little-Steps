<style>
:root{
  /* warm luxury — cream, caramel, espresso; tonal but alive */
  --bg:#efe3d0; --bg2:#e8d8bf; --surface:#f8f1e4; --card:#fbf4e7; --card2:#f4ecdb;
  --ink:#2f2820; --ink2:#57493a; --muted:#8f8067; --faint:#b4a585;
  --accent:#b3835e; --accent-d:#976748; --espresso:#2f2820; --espresso2:#463a2c;
  --line:rgba(140,110,70,.18); --line2:rgba(140,110,70,.11);
  /* warm tonal spectrum — muted but with real chroma so it reads as colour, not grey */
  --peach:#d1a17c; --peach-s:#e3bd98; --peach-b:#f2dcc3;
  --sage:#a6ac82; --sage-s:#c6caa0; --sage-b:#e2e4c4;
  --blue:#93aeae; --blue-s:#b7cdca; --blue-b:#dae6e1;
  --butter:#d9bd7f; --butter-s:#e9d5a0; --butter-b:#f5e8c2;
  --lav:#b7a2b3; --lav-s:#cfbcc9; --lav-b:#e6d9e1;
  --rose:#d2a394; --rose-s:#e4bfb1; --rose-b:#f2ddd2;
  --shadow:0 1px 2px rgba(110,80,45,.05), 0 12px 30px rgba(120,90,50,.09);
  --serif:ui-serif,'New York',Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);overflow:hidden;-webkit-font-smoothing:antialiased;}
#app{max-width:440px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;
  background:
    radial-gradient(55% 38% at 12% 6%, rgba(233,203,163,.55), transparent 62%),
    radial-gradient(48% 32% at 92% 26%, rgba(216,197,171,.5), transparent 60%),
    radial-gradient(70% 48% at 50% 106%, rgba(226,192,152,.45), transparent 62%),
    linear-gradient(180deg,#f5ead7,#ecdcc3 55%,#e7d5b9);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.scroll{position:absolute;inset:0 0 78px 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 20px 34px;}
.scroll::-webkit-scrollbar{display:none;}

/* splash — logo motion on open */
#splash{position:absolute;inset:0;z-index:100;background:radial-gradient(120% 90% at 50% 30%,#f8f1e0,#ecdcc2 70%,#e6d4b8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .65s ease;}
#splash.gone{opacity:0;pointer-events:none;}
#splash .slwrap{width:172px;height:172px;border-radius:34px;overflow:hidden;box-shadow:0 20px 50px rgba(120,90,50,.22);animation:logoIn 1.15s cubic-bezier(.2,.85,.3,1) both, logoFloat 3.4s ease-in-out 1.15s infinite;}
#splash img{width:100%;height:100%;object-fit:cover;display:block;}
#splash .sname{font-family:var(--serif);font-size:27px;color:var(--ink);letter-spacing:.4px;opacity:0;animation:fadeUp .7s ease .55s both;}
#splash .stag{font-size:11px;font-weight:700;letter-spacing:2.6px;text-transform:uppercase;color:var(--accent);opacity:0;animation:fadeUp .7s ease .78s both;}
@keyframes logoIn{0%{opacity:0;transform:scale(.72) translateY(14px)}55%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}

/* ---------- shared ---------- */
.status{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);
  font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:12px 2px 4px;}
.status .gear{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line);background:var(--card);}
.status .gear svg{width:17px;height:17px;}
.greet{padding:6px 2px 16px;}
.greet .g1{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.3px;color:var(--ink);line-height:1.1;}
.greet .g2{font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-top:8px;}

.hero{border-radius:30px;padding:27px 25px;position:relative;overflow:hidden;margin-bottom:16px;
  background:radial-gradient(120% 85% at 88% -5%,rgba(233,201,161,.6),transparent 55%),linear-gradient(160deg,#fdf6e8,#f2e2c6);
  border:1px solid var(--line2);box-shadow:0 2px 5px rgba(110,80,45,.05),0 20px 44px rgba(120,90,50,.12);}
.hero .wk{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);}
.hero .big{font-family:var(--serif);font-size:34px;font-weight:500;margin-top:8px;letter-spacing:-.5px;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05;}
.hero .sub{font-size:13.5px;margin-top:8px;color:var(--ink2);font-weight:500;letter-spacing:.2px;}
.hero .rev-line{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent-d);margin-top:12px;}

.card{background:linear-gradient(165deg,#fdf6ea,#f7efdd);border:1px solid var(--line2);border-radius:24px;padding:18px 19px;margin-bottom:14px;box-shadow:0 1px 2px rgba(110,80,45,.04),0 14px 34px rgba(120,90,50,.085);}
.hd{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink);margin-bottom:4px;letter-spacing:-.2px;}
.sec-label{font-size:11px;font-weight:700;letter-spacing:1.6px;color:var(--faint);text-transform:uppercase;margin:14px 2px 12px;}
.divider{height:1px;background:var(--line);margin:14px 0;}
.row{display:flex;align-items:center;gap:14px;}
.row .tx{font-size:14.5px;color:var(--ink2);font-weight:600;flex:1;letter-spacing:.1px;}
.row .tx small{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:3px;letter-spacing:0;}
.chip{width:44px;height:44px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex:none;border:1px solid rgba(255,255,255,.55);box-shadow:0 4px 10px rgba(120,90,50,.1),inset 0 1px 2px rgba(255,255,255,.4);}
.chip svg{width:22px;height:22px;}
.pk{background:linear-gradient(145deg,var(--peach-s),var(--peach));} .sg{background:linear-gradient(145deg,var(--sage-s),var(--sage));}
.bl{background:linear-gradient(145deg,var(--blue-s),var(--blue));} .bt{background:linear-gradient(145deg,var(--butter-s),var(--butter));}
.lv{background:linear-gradient(145deg,var(--lav-s),var(--lav));} .rs{background:linear-gradient(145deg,var(--rose-s),var(--rose));}
.check{width:30px;height:30px;border-radius:50%;border:2px solid var(--line);background:var(--card2);flex:none;display:flex;align-items:center;justify-content:center;transition:.18s;}
.check.on{background:linear-gradient(150deg,#aeb488,#7f8f52);border-color:transparent;box-shadow:0 4px 12px rgba(120,140,70,.38);}
.check svg{width:16px;height:16px;opacity:0;transform:scale(.4);transition:.18s;} .check.on svg{opacity:1;transform:scale(1);}
.check.pop{animation:pop .44s cubic-bezier(.3,1.5,.5,1);}
@keyframes pop{0%{transform:scale(.62)}48%{transform:scale(1.26)}100%{transform:scale(1)}}
/* task rows */
.taskrow{display:flex;align-items:center;gap:14px;padding:13px 0;transition:.2s;}
.taskrow+.taskrow{border-top:1px solid var(--line2);}
.taskrow .tx{flex:1;font-size:14.5px;color:var(--ink2);font-weight:600;letter-spacing:.1px;}
.taskrow .tx b{font-weight:600;}
.taskrow .tx small{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-top:3px;letter-spacing:0;}
.taskrow.done .tx{color:var(--muted);}
.taskrow.done .tx b{text-decoration:line-through;text-decoration-color:var(--line);}
/* water pips */
.wtr{display:flex;gap:6px;margin-top:12px;}
.wtr .glass{flex:1;height:42px;border-radius:11px;border:1.6px solid var(--line);background:var(--card2);display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;transition:.16s;}
.wtr .glass svg{width:15px;height:15px;opacity:.35;transition:.16s;}
.wtr .glass.f{background:linear-gradient(180deg,#c3dad6,#8fa8a6);border-color:transparent;box-shadow:0 3px 9px rgba(90,125,120,.32);}
.wtr .glass.f svg{opacity:1;}
.wtr .glass.pop{animation:pop .42s cubic-bezier(.3,1.5,.5,1);}
/* trimester bar */
.trlab{display:flex;justify-content:space-between;margin-top:7px;font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);}
.btn{display:block;width:100%;text-align:center;padding:17px;border-radius:16px;font-size:13px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#f3ede3;
  background:var(--espresso);box-shadow:0 10px 24px rgba(44,40,36,.24);}
