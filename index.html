<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Little Steps"><meta name="theme-color" content="#f6efe6"></head><body><title>Little Steps</title>
<style>
:root{
  --bg:#f6efe6; --surface:#fdf8f2; --card:#ffffff; --ink:#40382f; --muted:#8f857b; --faint:#b8ac9f;
  --peach:#eeae8e; --peach-s:#f6c9b2; --peach-b:#fbe2d4;
  --sage:#b6d3a2; --sage-s:#cfe3c3; --sage-b:#e6f0dd;
  --blue:#a9c8de; --blue-s:#c6ddec; --blue-b:#e2eef5;
  --butter:#e6cd8a; --butter-s:#f0dfb4; --butter-b:#f8efd6;
  --lav:#c3aede; --lav-s:#d8c9ec; --lav-b:#ece5f4;
  --rose:#e6adbf; --rose-s:#f0c9d5; --rose-b:#f8e6ec;
  --accent:#d98c73; --accent-d:#c9765a;
  --line:rgba(200,170,150,.28);
  --shadow:0 1px 2px rgba(150,110,90,.05), 0 10px 24px rgba(160,120,95,.08);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Rounded','SF Pro Text','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--font);color:var(--ink);background:var(--bg);overflow:hidden;}
#app{max-width:440px;margin:0 auto;height:100dvh;position:relative;overflow:hidden;
  background:radial-gradient(120% 60% at 20% 0%,#f9f0e6,#f2e7d9);}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.scroll{position:absolute;inset:0 0 76px 0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 30px;}
.scroll::-webkit-scrollbar{display:none;}

/* ---------- shared bits ---------- */
.status{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:800;padding:4px 4px 12px;}
.hero{border-radius:26px;padding:20px 20px;position:relative;overflow:hidden;margin-bottom:16px;box-shadow:0 14px 30px rgba(200,150,120,.22);}
.hero .glow{position:absolute;width:180px;height:180px;border-radius:50%;top:-60px;right:-50px;background:rgba(255,255,255,.35);filter:blur(6px);}
.hero .wk{font-size:12px;font-weight:800;letter-spacing:.6px;opacity:.85;position:relative;}
.hero .big{font-size:30px;font-weight:800;margin-top:4px;position:relative;letter-spacing:-.5px;font-variant-numeric:tabular-nums;}
.hero .sub{font-size:13px;margin-top:5px;position:relative;opacity:.92;font-weight:600;}
.card{background:linear-gradient(180deg,var(--card),#fffaf5);border:1px solid var(--line);border-radius:22px;padding:15px 16px;margin-bottom:13px;box-shadow:var(--shadow);}
.hd{font-size:15px;font-weight:800;color:#463d34;margin-bottom:4px;}
.sec-label{font-size:11px;font-weight:800;letter-spacing:.7px;color:var(--faint);text-transform:uppercase;margin:6px 4px 10px;}
.divider{height:1px;background:var(--line);margin:12px 0;}
.row{display:flex;align-items:center;gap:13px;}
.row .tx{font-size:14px;color:#5c5249;font-weight:600;flex:1;}
.row .tx small{display:block;font-size:11.5px;color:var(--muted);font-weight:500;margin-top:2px;}
.chip{width:44px;height:44px;border-radius:15px;display:flex;align-items:center;justify-content:center;flex:none;}
.chip svg{width:23px;height:23px;}
.pk{background:linear-gradient(140deg,var(--peach-s),var(--peach));} .sg{background:linear-gradient(140deg,var(--sage-s),var(--sage));}
.bl{background:linear-gradient(140deg,var(--blue-s),var(--blue));} .bt{background:linear-gradient(140deg,var(--butter-s),var(--butter));}
.lv{background:linear-gradient(140deg,var(--lav-s),var(--lav));} .rs{background:linear-gradient(140deg,var(--rose-s),var(--rose));}
.check{width:26px;height:26px;border-radius:9px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;transition:.15s;}
.check.on{background:linear-gradient(140deg,var(--accent),var(--accent-d));border-color:transparent;}
.check svg{width:15px;height:15px;opacity:0;transition:.15s;} .check.on svg{opacity:1;}
.btn{display:block;width:100%;text-align:center;padding:16px;border-radius:20px;font-size:15px;font-weight:800;color:#fff;
  background:linear-gradient(140deg,var(--accent),var(--accent-d));box-shadow:0 10px 22px rgba(217,140,115,.4);}
.btn.ghost{background:var(--card);color:var(--accent-d);box-shadow:none;border:1px solid var(--line);}

/* rings */
.rings{display:flex;gap:22px;justify-content:center;padding:6px 0 4px;}
.rw{text-align:center;}.rw .rl{font-size:10px;font-weight:800;color:var(--muted);margin-top:5px;letter-spacing:.4px;}

/* nav */
.nav{position:absolute;bottom:0;left:0;right:0;height:76px;padding-bottom:16px;background:rgba(255,255,255,.9);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:center;}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:800;color:var(--faint);}
.nav button svg{width:24px;height:24px;}
.nav button.on{color:var(--accent-d);}
.fab{position:absolute;bottom:92px;right:18px;width:56px;height:56px;border-radius:50%;z-index:20;
  background:linear-gradient(140deg,var(--lav),#a97fc4);box-shadow:0 12px 24px rgba(169,127,196,.5);
  display:flex;align-items:center;justify-content:center;}
.fab svg{width:28px;height:28px;}

/* onboarding */
.onb{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;padding:30px 26px 34px;
  background:radial-gradient(120% 70% at 30% 10%,#fbeee1,#f1e2d2);}
.onb.hide{display:none;}
.onb .top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;}
.onb h1{font-size:30px;font-weight:800;letter-spacing:-.5px;}
.onb p{font-size:15px;color:var(--muted);font-weight:600;max-width:280px;line-height:1.5;}
.opt{width:100%;padding:16px 18px;border-radius:18px;background:var(--card);border:1.5px solid var(--line);
  text-align:left;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:.15s;}
.opt.sel{border-color:var(--accent);background:var(--peach-b);}
.opt .e{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:none;}
input[type=date]{width:100%;padding:16px;border-radius:18px;border:1.5px solid var(--line);background:var(--card);
  font-family:inherit;font-size:16px;font-weight:700;color:var(--ink);text-align:center;}
.step{display:none;flex-direction:column;gap:2px;} .step.show{display:flex;}

/* kick circle */
.kickwrap{display:flex;flex-direction:column;align-items:center;padding:6px 0 4px;}
.kick{width:200px;height:200px;border-radius:50%;position:relative;margin:6px 0 6px;
  background:radial-gradient(circle at 35% 30%,#f4c3a8,#e2895f);box-shadow:0 20px 40px rgba(220,140,100,.5),inset 0 4px 10px rgba(255,255,255,.5);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:transform .08s;}
.kick:active{transform:scale(.96);}
.kick .n{font-size:64px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.kick .s{font-size:13px;font-weight:700;opacity:.95;margin-top:4px;}

/* day list */
.dayitem{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:18px;background:var(--card);
  border:1px solid var(--line);margin-bottom:10px;box-shadow:var(--shadow);}
.daydot{width:11px;height:11px;border-radius:50%;flex:none;}

/* modal / sheet */
.sheet-bg{position:absolute;inset:0;background:rgba(70,55,45,.4);z-index:50;opacity:0;pointer-events:none;transition:.2s;}
.sheet-bg.open{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:60;background:var(--surface);border-radius:28px 28px 0 0;
  padding:10px 18px calc(24px + env(safe-area-inset-bottom));max-height:82%;overflow-y:auto;transform:translateY(101%);transition:transform .28s cubic-bezier(.3,.9,.4,1);box-shadow:0 -10px 40px rgba(120,90,70,.25);}
.sheet.open{transform:translateY(0);}
.grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 14px;}
.bubble{border-radius:18px;padding:11px 14px;font-size:14px;margin-bottom:9px;max-width:85%;line-height:1.45;font-weight:600;}
.bubble.me{background:linear-gradient(140deg,var(--accent),var(--accent-d));color:#fff;margin-left:auto;border-bottom-right-radius:6px;}
.bubble.ai{background:var(--lav-b);color:#514840;border-bottom-left-radius:6px;}
.askrow{display:flex;gap:8px;margin-top:8px;position:sticky;bottom:0;background:var(--surface);padding:8px 0 2px;}
.askrow input{flex:1;padding:13px 15px;border-radius:16px;border:1.5px solid var(--line);background:var(--card);font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);}
.askrow button{width:48px;border-radius:16px;background:linear-gradient(140deg,var(--accent),var(--accent-d));display:flex;align-items:center;justify-content:center;}
.askrow button svg{width:20px;height:20px;}
textarea{width:100%;min-height:90px;padding:14px;border-radius:16px;border:1.5px solid var(--line);background:var(--card);font-family:inherit;font-size:14px;font-weight:600;color:var(--ink);resize:vertical;line-height:1.5;}
.mem{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px 15px;margin-bottom:10px;box-shadow:var(--shadow);}
.mem .mt{font-size:11px;font-weight:800;color:var(--accent-d);letter-spacing:.3px;margin-bottom:5px;}
.mem .mc{font-size:14px;color:#5c5249;font-weight:600;line-height:1.5;white-space:pre-wrap;}
.pill{display:inline-block;padding:5px 12px;border-radius:14px;font-size:11px;font-weight:800;}
.empty{text-align:center;color:var(--muted);font-size:13px;font-weight:600;padding:26px 10px;line-height:1.5;}
.moodpick{display:flex;gap:10px;justify-content:space-between;margin-top:4px;}
.moodpick button{flex:1;padding:12px 0;border-radius:15px;background:var(--card);border:1.5px solid var(--line);font-size:24px;transition:.15s;}
.moodpick button.on{border-color:var(--accent);background:var(--peach-b);transform:scale(1.05);}
.locked{opacity:.5;}
</style>

<!-- icon defs -->

<div id="app">
  <!-- onboarding -->
  <div class="onb" id="onb">
    <div class="step show" id="s1">
      <div class="top">
        <svg width="90" height="90" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#f6c9b2"/><path d="M38 34a12 12 0 1024 0 12 12 0 00-24 0z" fill="#7a3c25"/><path d="M36 30c3-10 22-10 25 0 2 8-3 12-3 12l-19 0s-4-6-3-12z" fill="#5e2c1b"/><path d="M50 50c11 0 16 7 17 19 2 15-3 27-3 27H41s-2-8-2-18c0-4 .7-8 2-12-4-1.5-6.5-5-6.5-9 0-1.5 0-2.5.7-4 3 4 8 5 14.8 4z" fill="#e79a78"/><path d="M64 66c9 1.5 14 9 14 18s-6 13-11 13c1.4-8-1-24-3-31z" fill="#e79a78"/></svg>
        <h1>Little Steps</h1>
        <p>The whole journey from two lines to first steps — one little step at a time.</p>
      </div>
      <button class="btn" onclick="onbGo('s2')">Get started</button>
    </div>
    <div class="step" id="s2">
      <div class="top" style="flex:none;align-items:flex-start;text-align:left;margin-top:12px">
        <h1 style="font-size:24px">Where are you right now?</h1>
      </div>
      <div style="flex:1">
        <button class="opt sel" id="o-preg" onclick="pickPhase('preg')"><span class="e pk"><svg width="20" height="20"><use href="#ic-heart"/></svg></span>I'm pregnant</button>
        <button class="opt" id="o-try" onclick="pickPhase('try')"><span class="e sg"><svg width="20" height="20"><use href="#ic-sparkle" stroke="#5f7d50"/></svg></span>Trying to conceive</button>
        <button class="opt" id="o-born" onclick="pickPhase('born')"><span class="e lv"><svg width="20" height="20"><use href="#ic-baby"/></svg></span>Baby's already here</button>
      </div>
      <button class="btn" onclick="onbGo('s3')">Continue</button>
    </div>
    <div class="step" id="s3">
      <div class="top" style="flex:none;align-items:flex-start;text-align:left;margin-top:12px">
        <h1 style="font-size:24px" id="dateQ">When are you due?</h1>
        <p id="dateHint">We'll build your whole timeline from this. You can change it any time.</p>
      </div>
      <div style="flex:1;width:100%;padding-top:6px">
        <input type="date" id="dueInput">
        <p style="font-size:12.5px;color:var(--muted);font-weight:600;margin-top:10px;text-align:center" id="dateEcho"></p>
      </div>
      <button class="btn" onclick="finishOnb()">Start my journey</button>
    </div>
  </div>

  <!-- tab views mount here -->
  <div class="scroll" id="view"></div>

  <button class="fab" id="fab" onclick="openAI()"><svg><use href="#ic-sparkle"/></svg></button>

  <div class="nav" id="nav">
    <button data-t="home" class="on" onclick="go('home')"><svg><use href="#ic-home"/></svg>Home</button>
    <button data-t="journey" onclick="go('journey')"><svg><use href="#ic-journey"/></svg>Journey</button>
    <button data-t="baby" onclick="go('baby')"><svg><use href="#ic-baby"/></svg>Baby</button>
    <button data-t="shop" onclick="go('shop')"><svg><use href="#ic-cart"/></svg>Shop</button>
    <button data-t="mem" onclick="go('mem')"><svg><use href="#ic-book"/></svg>Memories</button>
  </div>

  <!-- bottom sheet -->
  <div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
  <div class="sheet" id="sheet"><div class="grip"></div><div id="sheetBody"></div></div>
</div>

<script>
/* ---------------- state ---------------- */
var KEY='littleSteps_v1';
var S=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return {}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}
function today(){var d=new Date();d.setHours(0,0,0,0);return d;}
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
var DAY=86400000;

/* ---------------- baby data (weeks 4-40) ---------------- */
var W={

15:['an apple','10 cm','70 g',"Baby can sense light now, even with eyes fused shut."],
16:['an avocado','11.6 cm','100 g',"You might feel the first flutters soon — the 'quickening'."],
17:['a pear','12 cm','140 g',"Baby's skeleton is hardening from soft cartilage to bone."],
18:['a sweet potato','14 cm','190 g',"Baby's hearing is developing — they can hear your voice."],
19:['a mango','15 cm','240 g',"A waxy coating (vernix) now protects baby's delicate skin."],
20:['a banana','16 cm','300 g',"Halfway there! Baby is swallowing and building a routine."],
21:['a carrot','26 cm','360 g',"Baby's movements are getting stronger and more regular."],
22:['a spaghetti squash','28 cm','430 g',"Baby now looks like a tiny newborn, just smaller."],

function aiSend(){var i=document.getElementById('aiInput');var q=i.value.trim();if(!q)return;aiHist.push({who:'me',t:q});aiHist.push({who:'ai',t:aiReply(q)});i.value='';openAI();}
function aiReply(q){q=q.toLowerCase();var w=week()||18;
  if(/sushi|raw fish|fish/.test(q))return "Cooked sushi rolls are fine 👍 Just skip raw fish and high-mercury ones (tuna, swordfish). Cooked salmon and prawns are great.";
  if(/coffee|caffeine/.test(q))return "One small coffee a day is generally okay — aim to stay under about 200mg of caffeine total.";
  if(/wine|alcohol|drink/.test(q))return "Safest to skip alcohol entirely during pregnancy — there's no known safe amount. A fancy mocktail hits the same vibe 🍹";
  if(/cheap|save|budget|money/.test(q))return "For week "+w+": buy own-brand nappies and wipes, get the cot second-hand (mattress new), and skip a wipe-warmer — you won't miss it. Easily saves a few hundred.";
  if(/buy|shop|need/.test(q)){var s=SHOP[w]||nearestShop(w);return "This week I'd focus on: "+(s.join(', ')||'just the essentials')+". Everything else can wait — check the Shop tab.";}
  if(/kick|move|movement/.test(q))return "From around week 28, try to feel 10 movements a day. Use the Kick counter on the Baby tab. If movements drop, call your midwife — always better to check.";
  if(/paint|nursery/.test(q))return "Best to have someone else paint, and keep the room well-ventilated. Low-VOC paint is ideal. Weeks 20-30 are a comfy time to get it done.";
  if(/nappy|diaper|size/.test(q))return "Start with newborn size, but only buy one box — babies grow fast and many skip straight to size 1. Stock size 1 more heavily.";
  if(/tired|sleep|exhaust/.test(q))return "Totally normal 💛 Rest when you can, nap if possible, and a left-side sleeping position helps blood flow later on.";
  if(/name/.test(q))return "Start a shortlist in the Baby tab — jot down anything you both half-like, then revisit. Say them out loud with your surname!";
  if(/hi|hello|hey/.test(q))return "Hey! 💛 How are you feeling today? Ask me anything about week "+w+".";
  return "Great question. I'd check that one with your midwife to be safe — but in general, week "+w+" is about "+weeklyFocus(w).toLowerCase()+". Want tips on that?";}
